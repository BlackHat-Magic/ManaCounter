[phases.setup]
nixPkgs = ["nodejs", "nginx"]

[phases.build]
dependsOn = ["install"]
cmds = [
    "npx @tailwindcss/cli -i ./static/css/main.css -o ./static/dist/main.css --minify",
]

[phases.install]
cmds = ["npm ci"]

[start]
cmd = "mkdir -p /var/log/nginx && nginx -g 'daemon off;' -c /app/nginx.conf"
